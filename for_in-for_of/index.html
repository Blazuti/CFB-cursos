<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operador spread</title>
</head>
<body onload="start()">
    <div class="text">teste numero 01</div>
    <div class="text">teste numero 02</div>
    <div class="text">teste numero 03</div>
    
    <script>
    function start(){       
       let objs = document.getElementsByClassName("text")

        /*for(let i=0; i < objs.length; i++){
           console.log(i)}*/
        //Éa = a for in, retorna o indice de cada elemento
        for(n in objs){
            console.log(objs[n].innerHTML="test")
        }
        
        /*for (let i=0; i< objs.length; i++){
        console.log(objs[i])}*/
        //É = a for of, retorna o valor de cada indice(elemento)
        for(n of objs){
            console.log(n.innerHTML="test")
        }
        
    }
        
    </script>
</body>
</html>
