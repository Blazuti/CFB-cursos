<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operador spread</title>
</head>
<body>
    <form action="#">
        <label for="inum">Numeros a serem somados</label>
        <input type="number" name="num1" id="inum">
        <input type="button" value="adicionar" id="adiciona">
        <input type="button" value="somar" id="somar">
        <div id="res">Aguardando envio...</div>
    </form>
    
    <script>
    let num = document.querySelector("#inum")
    let result = document.querySelector("#res")
    let valores = []
    const adicionar = document.querySelector("#adiciona")
    const somar = document.querySelector("#somar")

    adicionar.addEventListener('click', () => {
            valores.push(Number(num.value));
            res.textContent = valores.join(', ');
            num.value = '';
            num.focus();
        });

        somar.addEventListener('click', () => {
            const soma = valores.reduce((a,b)=>a+b,0);
            res.textContent = soma;
        });
    
    
    
        
    
    </script>
</body>
</html>
