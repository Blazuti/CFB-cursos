<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operador spread</title>
</head>
<body>
    <form action="#">
        <label for="inum1">Numeros a serem somados</label>
        <input type="number" name="num1" id="inum1">
        <input type="button" value="Somar" id="soma">
        <input type="button" value="limpar" id="limpar">
        <div id="res">Aguardando envio...</div>
    </form>
    
    <script>
    let num = document.querySelector("#inum1")
    let envio = document.querySelector("#soma")
    let result = document.querySelector("#res")
    const limp = document.querySelector("#limpar")
    envio.addEventListener('click', clicou)
    limpar.addEventListener('click', limpou)
    let c = 0

    function clicou(){ 
        
        c+=Number(num.value)
        result.innerHTML = c
    }
    function limpou(){
        c = 0
        result.innerHTML = 'Aguardando envio...'
    }
        
    
    </script>
</body>
</html>
